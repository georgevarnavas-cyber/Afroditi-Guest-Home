        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

        window.changeCategoryOption = function(categoryIdx, optionIdx) {
            db[currentLang].categories[categoryIdx].activeIndex = optionIdx;
            renderPlaces();
        }

        function renderPlaces() {
            const container = document.getElementById('places-container'); container.innerHTML = '';
            const data = db[currentLang];

            data.categories.forEach((category, cIdx) => {
                const activeIdx = category.activeIndex; const activeOption = category.options[activeIdx];
                const dist = calculateDistance(propertyCoords.lat, propertyCoords.lng, activeOption.lat, activeOption.lng);
                const time = Math.round(dist * 2); 
                let distanceText = data.gpsFormat.replace('{dist}', dist.toFixed(1)).replace('{time}', time);

                let buttonsHtml = '';
                category.options.forEach((opt, oIdx) => {
                    buttonsHtml += `<button onclick="changeCategoryOption(${cIdx}, ${oIdx})" class="${oIdx === activeIdx ? 'px-3 py-1 text-xs font-bold rounded-full bg-blue-600 text-white shadow-sm' : 'px-3 py-1 text-xs font-semibold rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200'} transition">${oIdx + 1}</button>`;
                });

                container.innerHTML += `
                    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm hover:shadow-md transition">
                        <div class="w-full h-44 overflow-hidden bg-slate-100 relative">
                            <img src="${activeOption.image}" loading="lazy" class="w-full h-full object-cover fade-in-img" alt="${activeOption.title}">
                        </div>
                        <div class="p-4">
                            <div class="flex gap-1.5 justify-center mb-3 pb-2 border-b border-slate-50">${buttonsHtml}</div>
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">${category.name}</span>
                                <span class="text-xs font-semibold text-amber-500">${activeOption.rating}</span>
                            </div>
                            <h4 class="font-bold text-slate-800 text-sm h-5 truncate">${activeOption.title}</h4>
                            <p class="text-xs text-slate-500 mt-1 leading-relaxed h-12 overflow-hidden">${activeOption.desc}</p>
                            <div class="mt-3 pt-3 border-t border-slate-50 flex items-center justify-between text-[11px] font-semibold text-slate-400">
                                <span>${distanceText}</span>
                                <a href="${activeOption.url}" target="_blank" class="text-blue-600 font-bold hover:underline">${data.gpsNav}</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function updateUI(lang) {
            currentLang = lang; const data = db[lang];
            document.getElementById('ui-subtitle').innerText = data.subtitle;
            document.getElementById('ui-section-places').innerText = data.secPlaces;
            document.getElementById('ui-section-chat').innerText = data.secChat;
            document.getElementById('ui-whatsapp-text').innerText = data.whatsapp;
            document.getElementById('chat-input').placeholder = data.placeholder;
            document.getElementById('btn-tag-weather').innerText = data.tags.weather;
            document.getElementById('btn-tag-events').innerText = data.tags.events;
            document.getElementById('btn-tag-rules').innerText = data.tags.rules;
            document.getElementById('btn-tag-taxi').innerText = data.tags.taxi;

            document.getElementById('chat-box').innerHTML = `
                <div class="flex items-start">
                    <div class="bg-slate-100 text-slate-800 text-sm p-3.5 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm">${data.welcome}</div>
                </div>
            `;
            renderPlaces();
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const cleanText = text.replace(/\*\*/g, '');
                const chunks = cleanText.split(/[,.!;]/).map(s => s.trim()).filter(s => s.length > 0);
                let chunkIdx = 0;

                function speakNextChunk() {
                    if (chunkIdx >= chunks.length) return;
                    const utterance = new SpeechSynthesisUtterance(chunks[chunkIdx]);
                    utterance.lang = { el: 'el-GR', en: 'en-US', de: 'de-DE', fr: 'fr-FR', es: 'es-ES', it: 'it-IT', zh: 'zh-CN' }[currentLang];
                    utterance.rate = 0.85; 
                    utterance.pitch = 1.0;

                    utterance.onend = () => { 
                        chunkIdx++; 
                        setTimeout(speakNextChunk, 250); 
                    };
                    window.speechSynthesis.speak(utterance);
                }
                speakNextChunk();
            }
        }

        function appendMessage(text, isUser = false, imageUrl = null) {
            const chatBox = document.getElementById('chat-box');
            const messageWrapper = document.createElement('div');
            messageWrapper.className = isUser ? 'flex items-start justify-end' : 'flex items-start';
            
            const bubbleClass = isUser 
                ? 'bg-blue-600 text-white text-sm p-3.5 rounded-2xl rounded-tr-none max-w-[85%] shadow-sm' 
                : 'bg-slate-100 text-slate-800 text-sm p-3.5 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm space-y-2 leading-relaxed';

            let imageHtml = (imageUrl && !isUser) ? `<img src="${imageUrl}" loading="lazy" class="w-full h-32 object-cover rounded-xl mb-1 shadow-sm fade-in-img" alt="Preview">` : '';

            messageWrapper.innerHTML = `<div class="${bubbleClass}">${imageHtml}<div>${text}</div></div>`;
            chatBox.appendChild(messageWrapper);
            messageWrapper.scrollIntoView({ behavior: 'smooth' });
            
            if (!isUser) speak(text);
        }

        function handleAIResponse(userText) {
            const text = userText.toLowerCase(); const data = db[currentLang];
            if (data.keywords.wifi.some(kw => text.includes(kw))) return data.wifi;
            if (data.keywords.food.some(kw => text.includes(kw))) return data.food;
            if (data.keywords.beach.some(kw => text.includes(kw))) return data.beach;
            if (data.keywords.weather.some(kw => text.includes(kw))) { return { text: data.weather.text.replace('{temp}', liveTemperature), img: data.weather.img }; }
            if (data.keywords.events.some(kw => text.includes(kw))) return data.events;
            if (data.keywords.rules.some(kw => text.includes(kw))) return data.rules;
            if (data.keywords.taxi.some(kw => text.includes(kw))) return data.taxi;
            if (data.keywords.excursion.some(kw => text.includes(kw))) return data.excursion;
            return data.general;
        }

        window.triggerQuickAction = function(actionType) {
            const data = db[currentLang]; let tagText = ""; let replyObj;
            if (actionType === 'weather') { tagText = data.tags.weather; replyObj = data.weather; replyObj.text = replyObj.text.replace('{temp}', liveTemperature); }
            else if (actionType === 'events') { tagText = data.tags.events; replyObj = data.events; }
            else if (actionType === 'rules') { tagText = data.tags.rules; replyObj = data.rules; }
            else if (actionType === 'taxi') { tagText = data.tags.taxi; replyObj = data.taxi; }

            appendMessage(tagText, true);
            setTimeout(() => appendMessage(replyObj.text, false, replyObj.img), 500);
        }

        const chatInput = document.getElementById('chat-input'); const sendBtn = document.getElementById('send-btn');
        function sendMessage() {
            const msg = chatInput.value.trim(); if (!msg) return;
            appendMessage(msg, true); chatInput.value = '';
            const reply = handleAIResponse(msg);
            setTimeout(() => appendMessage(reply.text, false, reply.img), 500);
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        const voiceBtn = document.getElementById('voice-btn');
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition(); recognition.interimResults = false;

            voiceBtn.addEventListener('click', () => {
                try {
                    recognition.lang = { el: 'el-GR', en: 'en-US', de: 'de-DE', fr: 'fr-FR', es: 'es-ES', it: 'it-IT', zh: 'zh-CN' }[currentLang]; 
                    voiceBtn.classList.add('bg-red-100', 'text-red-600', 'animate-pulse');
                    chatInput.placeholder = db[currentLang].listening; recognition.start();
                } catch (err) { voiceBtn.classList.remove('bg-red-100', 'text-red-600', 'animate-pulse'); }
            });
            recognition.onresult = (event) => { chatInput.value = event.results[0][0].transcript; sendMessage(); };
            recognition.onend = () => { voiceBtn.classList.remove('bg-red-100', 'text-red-600', 'animate-pulse'); chatInput.placeholder = db[currentLang].placeholder; };
        } else { voiceBtn.style.display = 'none'; }

        document.getElementById('lang-select').addEventListener('change', (e) => { updateUI(e.target.value); });
        fetchLiveWeather().then(() => { updateUI('el'); });
    </script>
</body>
</html>
